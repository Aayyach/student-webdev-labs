<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Exercise 02 - Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body class="bg-light">
    <main class="d-flex align-items-center">
      <form
        action="/submitform"
        class="ira-form container mt-5 border border-2 bg-white rounded"
      >
        <div class="row col-12 my-3">
          <h1 class="text-center m-4 fs-2">Roth IRA Calculator</h1>
        </div>
        <div class="row mb-3">
          <label for="balance" class="col-sm-6 col-form-label"
            >Balance ($)</label
          >
          <div class="col-sm-6">
            <input
              class="form-control"
              type="text"
              id="balance"
              name="balance"
            />
          </div>
        </div>

        <div class="row mb-3">
          <label class="col-sm-6 col-form-label" for="annual"
            >Annual contribution ($)</label
          >
          <div class="col-sm-6">
            <input class="form-control" type="text" id="annual" name="annual" />
          </div>
        </div>

        <fieldset class="row mb-3">
          <legend class="col-sm-6 col-form-label">
            Maximize contributions?
          </legend>
          <div class="col-sm-6">
            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                id="yes"
                name="max"
                value="yes"
              />
              <label class="form-check-label" for="yes">Yes</label>
            </div>
            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                id="no"
                name="max"
                value="no"
              />
              <label class="form-check-label" for="no">No</label>
            </div>
          </div>
        </fieldset>

        <div class="row mb-3">
          <label class="col-sm-6 col-form-label" for="ROR"
            >Expected rate of return (%)</label
          >
          <div class="col-sm-6">
            <input class="form-control" type="number" id="ROR" name="ROR" />
          </div>
        </div>

        <div class="row mb-3">
          <label class="col-sm-6 col-form-label" for="age">Current age</label>
          <div class="col-sm-6">
            <input class="form-control" type="number" id="age" name="age" />
          </div>
        </div>

        <div class="row mb-3">
          <label class="col-sm-6 col-form-label" for="retire"
            >Retirement age</label
          >
          <div class="col-sm-6">
            <input
              class="form-control"
              type="number"
              id="retire"
              name="retire"
            />
          </div>
        </div>

        <div class="row mb-3">
          <label class="col-sm-6 col-form-label" for="tax"
            >Marginal tax rate (%)</label
          >
          <div class="col-sm-6">
            <input class="form-control" type="number" id="tax" name="tax" />
          </div>
        </div>

        <div class="row my-4">
          <div class="d-flex gap-2">
            <input
              class="btn btn-primary w-100"
              type="submit"
              value="Calculate"
            />
            <input
              class="btn btn-outline-secondary w-100"
              type="reset"
              value="Reset"
            />
          </div>
        </div>

        <p>
          This exercise is a simplified version of the Roth IRA Calculator at
          <a class="text-primary" href="https://www.calculator.net/"
            >Calculator.net</a
          >
        </p>
      </form>
    </main>
  </body>
</html>
